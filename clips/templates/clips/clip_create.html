{% extends 'base.html' %}

{% block content %}
    <h1>Upload a New Clip</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Upload</button>
    </form>
    <p><a href="{% url 'dashboard' %}">Go to Homepage</a></p>
{% endblock %}
