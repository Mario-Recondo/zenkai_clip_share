{% extends 'base.html' %}

{% block header %}{% endblock %}

{% block content %}
    <h1>Login</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <small class="text-muted">
        Need an account? <a href="{% url 'register' %}">Sign Up Now</a>
    </small>
{% endblock %}
